name: Deploy to Lightsail

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: lightsail-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy production compose stack
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
      LIGHTSAIL_USER: ${{ secrets.LIGHTSAIL_USER || 'ubuntu' }}
      LIGHTSAIL_SSH_KEY: ${{ secrets.LIGHTSAIL_SSH_KEY }}
      LIGHTSAIL_SSH_PORT: ${{ secrets.LIGHTSAIL_SSH_PORT || '22' }}
      LIGHTSAIL_DEPLOY_PATH: ${{ secrets.LIGHTSAIL_DEPLOY_PATH || '/home/ubuntu/MenuManager' }}
      LIGHTSAIL_KNOWN_HOSTS: ${{ secrets.LIGHTSAIL_KNOWN_HOSTS }}

    steps:
      - name: Validate deployment secrets
        shell: bash
        run: |
          set -euo pipefail
          : "${LIGHTSAIL_HOST:?Missing LIGHTSAIL_HOST repository secret}"
          : "${LIGHTSAIL_USER:?Missing LIGHTSAIL_USER repository secret}"
          : "${LIGHTSAIL_SSH_KEY:?Missing LIGHTSAIL_SSH_KEY repository secret}"
          : "${LIGHTSAIL_SSH_PORT:?Missing LIGHTSAIL_SSH_PORT repository secret}"
          : "${LIGHTSAIL_DEPLOY_PATH:?Missing LIGHTSAIL_DEPLOY_PATH repository secret}"

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$LIGHTSAIL_SSH_KEY" > ~/.ssh/lightsail_deploy_key
          chmod 600 ~/.ssh/lightsail_deploy_key

          if [ -n "$LIGHTSAIL_KNOWN_HOSTS" ]; then
            printf '%s\n' "$LIGHTSAIL_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "$LIGHTSAIL_SSH_PORT" "$LIGHTSAIL_HOST" > ~/.ssh/known_hosts
          fi
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy on Lightsail
        shell: bash
        run: |
          set -euo pipefail
          remote_path="$(printf '%q' "$LIGHTSAIL_DEPLOY_PATH")"
          remote_ref="$(printf '%q' "$GITHUB_REF_NAME")"

          ssh \
            -i ~/.ssh/lightsail_deploy_key \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=120 \
            -o TCPKeepAlive=yes \
            -p "$LIGHTSAIL_SSH_PORT" \
            "$LIGHTSAIL_USER@$LIGHTSAIL_HOST" \
            "DEPLOY_PATH=$remote_path DEPLOY_REF=$remote_ref bash -se" <<'REMOTE'
          set -euo pipefail

          cd "$DEPLOY_PATH"
          git fetch --prune origin
          git checkout -B "$DEPLOY_REF" "origin/$DEPLOY_REF"
          git reset --hard "origin/$DEPLOY_REF"

          if docker ps >/dev/null 2>&1; then
            DOCKER=(docker)
          elif sudo -n docker ps >/dev/null 2>&1; then
            DOCKER=(sudo docker)
          else
            echo "Docker is not available for this user. Add the deploy user to the docker group or allow passwordless sudo for docker." >&2
            exit 1
          fi

          if "${DOCKER[@]}" compose version >/dev/null 2>&1; then
            COMPOSE=("${DOCKER[@]}" compose)
          elif command -v docker-compose >/dev/null 2>&1; then
            COMPOSE=(docker-compose)
          else
            echo "Docker Compose is not installed. Install the docker compose plugin or docker-compose." >&2
            exit 1
          fi

          "${DOCKER[@]}" system prune -af

          # Pre-deploy schema-drift gate. Build the new image, then run the gate in
          # a one-off container BEFORE swapping the running stack — so that once it
          # is set to block, a drift failure aborts here (set -e) with prod still
          # serving the old version. It compares supabase/schema.sql against the live
          # database and, on drift, writes a system_alert. Ships in warn mode
          # (reports, exit 0); set SCHEMA_DRIFT_GATE=block in the host .env to enforce.
          # See docs/design-docs/schema-drift-gate.md.
          "${COMPOSE[@]}" build dashboard
          echo "Running pre-deploy schema-drift gate..."
          # </dev/null is load-bearing: this whole script is fed to `bash -se` over
          # ssh stdin (the heredoc), and `docker compose run` forwards the parent's
          # stdin into the container — which DRAINS the rest of the heredoc (the
          # `up`, health check, and cron steps below). Without this redirect the
          # gate silently eats the deploy: images rebuild but containers never swap,
          # so every deploy since the gate landed (1a15310) shipped nothing live.
          "${COMPOSE[@]}" run --rm --no-deps -T dashboard node /app/scripts/check-schema-drift.js </dev/null

          # --force-recreate: `up --build` rebuilds images but Compose may leave a
          # running container on its OLD image if it thinks nothing changed, so a
          # deploy can report success while prod keeps serving the previous code
          # (observed Jul 2026: a shipped improvement-cycle change never went live).
          # Force a container swap onto the freshly built image every deploy.
          "${COMPOSE[@]}" up -d --build --force-recreate --remove-orphans
          "${COMPOSE[@]}" ps

          if command -v curl >/dev/null 2>&1; then
            for attempt in $(seq 1 30); do
              if curl -fsS http://localhost:3005/ >/dev/null; then
                echo "Dashboard health check passed"
                break
              fi

              if [ "$attempt" -eq 30 ]; then
                echo "Dashboard health check failed after 30 attempts" >&2
                exit 1
              fi

              sleep 3
            done
          fi

          # Install/refresh the improvement-cycle cron (idempotent).
          # Every other day (odd days of month) at 09:15 UTC = overnight US, so
          # proposals are ready at start of day. Note */2 on day-of-month means
          # month boundaries can occasionally give back-to-back runs (31st -> 1st);
          # harmless — the correction gate makes an empty run a no-op.
          chmod +x "$DEPLOY_PATH/scripts/run-improvement-cycle-cron.sh"
          CRON_LINE="15 9 */2 * * /usr/bin/flock -n /tmp/menumanager-improve.lock $DEPLOY_PATH/scripts/run-improvement-cycle-cron.sh >> /tmp/menumanager-improve-cron.log 2>&1"
          ( crontab -l 2>/dev/null | grep -v 'run-improvement-cycle-cron.sh' || true; echo "$CRON_LINE" ) | crontab -
          echo "Improvement-cycle cron installed"
          REMOTE
